<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Finder App</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: linear-gradient(to right, #2c5364, #203a43, #0f2027);
  color: white;
  text-align: center;
}

.container {
  padding: 20px;
}

h1 {
  margin-bottom: 20px;
}

.search-box {
  margin-bottom: 20px;
}

input {
  padding: 10px;
  width: 250px;
  border-radius: 5px;
  border: none;
}

button {
  padding: 10px 15px;
  border-radius: 5px;
  border: none;
  cursor: pointer;
  background: #ff9800;
  color: white;
  font-weight: bold;
}

button:hover {
  background: #e68900;
}

#recipeList {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}

.recipe-card {
  background: white;
  color: black;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 4px 8px rgba(0,0,0,0.3);
  transition: transform 0.3s;
}

.recipe-card:hover {
  transform: scale(1.05);
}

.recipe-card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.content {
  padding: 15px;
}

.content a {
  display: inline-block;
  margin-top: 10px;
  padding: 8px 12px;
  background: #2c5364;
  color: white;
  text-decoration: none;
  border-radius: 5px;
}

.content a:hover {
  background: #203a43;
}

.error {
  color: red;
  font-weight: bold;
}
</style>

</head>
<body>

<div class="container">
  <h1>🍽 Recipe Finder</h1>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search for recipes...">
    <button onclick="getRecipes()">Search</button>
  </div>

  <div id="recipeList"></div>
</div>

<script>
const recipeList = document.getElementById("recipeList");

function getRecipes() {
  const query =
    document.getElementById("searchInput").value.trim() || "chicken";

  recipeList.innerHTML = "Loading...";

  fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${encodeURIComponent(query)}`)
    .then((res) => res.json())
    .then((data) => {
      if (!data.meals) {
        recipeList.innerHTML = `<p class="error">No recipes found.</p>`;
        return;
      }

      recipeList.innerHTML = "";

      data.meals.slice(0, 6).forEach((meal) => {
        recipeList.innerHTML += `
          <div class="recipe-card">
            <img src="${meal.strMealThumb}" alt="${meal.strMeal}">
            <div class="content">
              <h4>${meal.strMeal}</h4>
              <p><strong>Category:</strong> ${meal.strCategory}</p>
              <p><strong>Area:</strong> ${meal.strArea}</p>
              <a href="${meal.strSource || meal.strYoutube}" target="_blank">
                View Recipe
              </a>
            </div>
          </div>
        `;
      });
    })
    .catch(() => {
      recipeList.innerHTML = `<p class="error">Error loading recipes.</p>`;
    });
}
</script>

</body>
</html>
